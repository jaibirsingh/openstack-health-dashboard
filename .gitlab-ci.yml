stages:
  - lint
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: openstack-health-dashboard
  IMAGE_TAG: $CI_COMMIT_SHA
  DEMO_MODE: "true"

# ── LINT ──────────────────────────────────────────────
lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=100 --exclude=__pycache__
  only:
    - main
    - merge_requests

# ── TEST ──────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pytest tests/ -v --cov=app --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  only:
    - main
    - merge_requests

# ── BUILD ─────────────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
    - echo "Image $IMAGE_NAME:$IMAGE_TAG built successfully"
  only:
    - main

# ── DEPLOY ────────────────────────────────────────────
deploy:
  stage: deploy
  image: python:3.11-slim
  script:
    - pip install ansible
    - ansible-playbook ansible/deploy.yml -i ansible/inventory.ini
  only:
    - main
  when: manual
  environment:
    name: production
    url: http://localhost:5000
